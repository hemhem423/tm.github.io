<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TONDAMA | Works</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="page.css" />
  </head>
  <body>
    <!-- Page Loader -->
    <div class="page-loader" id="js-loader">
      <div class="page-loader__inner">TONDAM<span>A</span></div>
    </div>

    <!-- Cursor -->
    <div class="c-dot" id="js-cdot"></div>
    <div class="c-ring" id="js-cring"></div>

    <!-- Mobile toggle -->
    <button class="sidebar__toggle" id="js-toggle" aria-label="メニュー">
      <span class="sidebar__toggle-line"></span>
      <span class="sidebar__toggle-line"></span>
      <span class="sidebar__toggle-line"></span>
    </button>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="js-sidebar">
      <div>
        <a href="index.html" class="sidebar__logo"
          >TONDAM<span>A</span><br /><span>P</span>ORTFOLIO</a
        >
        <nav class="sidebar__nav" aria-label="サイドナビ">
          <a href="index.html" class="sidebar__nav-item">
            <span class="sidebar__nav-dot"></span>Home
          </a>
          <a href="works.html" class="sidebar__nav-item is-active">
            <span class="sidebar__nav-dot"></span>Works
          </a>
          <a href="about.html" class="sidebar__nav-item">
            <span class="sidebar__nav-dot"></span>About
          </a>
          <a href="index.html#contact" class="sidebar__nav-item">
            <span class="sidebar__nav-dot"></span>Contact
          </a>
        </nav>
      </div>
      <div class="sidebar__bottom">
        <div class="sidebar__socials">
          <a href="#" class="sidebar__social" target="_blank" rel="noopener"
            >Twitter</a
          >
          <a href="#" class="sidebar__social" target="_blank" rel="noopener"
            >Instagram</a
          >
        </div>
      </div>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-wrap" id="js-main">
      <!-- Hero -->
      <section class="works-hero">
        <div class="works-hero__bg-txt" aria-hidden="true">WORKS</div>
        <h1 class="works-hero__title js-reveal">WORKS</h1>
      </section>

      <!-- Filter -->
      <div class="works-filter">
        <button class="works-filter__btn is-active" data-filter="all">
          All
        </button>
        <button class="works-filter__btn" data-filter="コーポレート">
          コーポレート
        </button>
        <button class="works-filter__btn" data-filter="EC / ショップ">
          EC / ショップ
        </button>
        <button class="works-filter__btn" data-filter="LP">LP</button>
        <button class="works-filter__btn" data-filter="ポートフォリオ">
          ポートフォリオ
        </button>
      </div>

      <!-- Gallery -->
      <div class="works-gallery">
        <div class="works-gallery__grid" id="js-works-grid">
          <!-- 実績データ: data-cat でフィルタ分類 -->

          <article
            class="work-item work-item--wide js-reveal"
            data-cat="コーポレート"
            data-title="ANIMEA | 動物医療専門学校"
            data-desc="動物医療専門学校のコーポレートサイトリニューアル。入学を検討する学生に向けた、温かみのある世界観とUXを設計しました。ヒーロービジュアルの刷新とCMS実装も担当。"
            data-tags="コーポレート,CMS,WordPress,Figma"
            data-img="image/animea.png"
            data-url="#"
          >
            <div class="work-item__thumb">
              <img
                src="image/animea.png"
                alt="ANIMEA 動物医療専門学校"
                loading="lazy"
              />
              <div class="work-item__overlay">
                <div class="work-item__overlay-icon">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M15 3h6v6M10 14L21 3M21 13v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h8"
                    />
                  </svg>
                </div>
                <span class="work-item__overlay-label">View Detail</span>
              </div>
            </div>
          </article>

          <article
            class="work-item js-reveal"
            data-cat="EC / 店舗"
            data-title="Maison de Lumière | インテリアショップ"
            data-desc="高級インテリアブランドのECサイト。商品の素材感や質感を最大限に伝えるビジュアル設計と、スムーズな購買体験を実現するUI/UXを担当しました。"
            data-tags="EC,Shopify,UI/UX,Figma"
            data-img="image/maison.png"
            data-url="#"
          >
            <div class="work-item__thumb">
              <img
                src="image/maison.png"
                alt="Maison de Lumière インテリアショップ"
                loading="lazy"
              />
              <div class="work-item__overlay">
                <div class="work-item__overlay-icon">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M15 3h6v6M10 14L21 3M21 13v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h8"
                    />
                  </svg>
                </div>
                <span class="work-item__overlay-label">View Detail</span>
              </div>
            </div>
          </article>

          <article
            class="work-item js-reveal"
            data-cat="EC / 店舗"
            data-title="Noir & Blanc | カフェ"
            data-desc="モノクロをベースにしたスタイリッシュなカフェのWebサイト。ブランドの世界観に合わせたタイポグラフィ主体のデザインと、滑らかなアニメーションを実装しました。"
            data-tags="カフェ,HTML/CSS,アニメーション"
            data-img="image/Noir-Blanc.png"
            data-url="#"
          >
            <div class="work-item__thumb">
              <img
                src="image/Noir-Blanc.png"
                alt="Noir & Blanc カフェ"
                loading="lazy"
              />
              <div class="work-item__overlay">
                <div class="work-item__overlay-icon">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M15 3h6v6M10 14L21 3M21 13v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h8"
                    />
                  </svg>
                </div>
                <span class="work-item__overlay-label">View Detail</span>
              </div>
            </div>
          </article>

          <article
            class="work-item work-item--wide js-reveal"
            data-cat="ポートフォリオ"
            data-title="TONDAMA | ポートフォリオ"
            data-desc="本サイト。サイドバー固定レイアウト・マッソングリッドのヒーロービジュアル・プロフィールカードインタラクションなど、独自のUIコンポーネントをVanilla JSで実装。"
            data-tags="ポートフォリオ,HTML/CSS,JavaScript,UI/UX"
            data-img="image/portfolio.png"
            data-url="#"
          >
            <div class="work-item__thumb">
              <img
                src="image/portfolio.png"
                alt="TONDAMA ポートフォリオ"
                loading="lazy"
              />
              <div class="work-item__overlay">
                <div class="work-item__overlay-icon">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M15 3h6v6M10 14L21 3M21 13v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h8"
                    />
                  </svg>
                </div>
                <span class="work-item__overlay-label">View Detail</span>
              </div>
            </div>
          </article>
        </div>
        <!-- /.works-gallery__grid -->
      </div>
      <!-- /.works-gallery -->

      <!-- Footer -->
      <footer class="footer">
        <div class="footer__inner">
          <div class="footer__top">
            <div>
              <div class="footer__logo">TONDAM<span>A</span></div>
            </div>
            <nav class="footer__nav">
              <a href="index.html" class="footer__nav-lnk">Home</a>
              <a href="works.html" class="footer__nav-lnk">Works</a>
              <a href="about.html" class="footer__nav-lnk">About</a>
              <a href="index.html#contact" class="footer__nav-lnk">Contact</a>
            </nav>
          </div>
          <div class="footer__bottom">
            <p class="footer__copy">©2026 TONDAMA. All rights reserved.</p>
          </div>
        </div>
      </footer>
    </div>
    <!-- /.main-wrap -->

    <!-- ============================================================
         Lightbox (body に直接 append — main-wrap の外)
    ============================================================ -->
    <div
      class="lb-overlay"
      id="js-lb"
      role="dialog"
      aria-modal="true"
      aria-label="作品詳細"
    >
      <button class="lb-close" id="js-lb-close" aria-label="閉じる">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" /></svg>
      </button>
      <div class="lb-inner">
        <div class="lb-img-wrap" id="js-lb-img-wrap">
          <img src="" alt="" id="js-lb-img" />
          <button
            class="lb-arrow lb-arrow--prev"
            id="js-lb-prev"
            aria-label="前の作品"
          >
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
          </button>
          <button
            class="lb-arrow lb-arrow--next"
            id="js-lb-next"
            aria-label="次の作品"
          >
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" /></svg>
          </button>
        </div>
        <div class="lb-info">
          <p class="lb-info__num" id="js-lb-num">01 / 04</p>
          <p class="lb-info__cat" id="js-lb-cat"></p>
          <h2 class="lb-info__title" id="js-lb-title"></h2>
          <p class="lb-info__desc" id="js-lb-desc"></p>
          <div class="lb-info__tags" id="js-lb-tags"></div>
          <a
            href="#"
            class="lb-info__link"
            id="js-lb-link"
            target="_blank"
            rel="noopener"
          >
            サイトを見る →
          </a>
        </div>
      </div>
    </div>

    <script src="page.js"></script>
  </body>
</html>
